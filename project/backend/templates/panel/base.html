{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ page_title }} · Support Panel</title>
    <style>
      :root {
        --bg: #eef3f7;
        --surface: #ffffff;
        --muted: #64748b;
        --ink: #0f172a;
        --accent: #0e61a5;
        --accent-2: #4c8fd0;
        --border: #e2e8f0;
        --shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--ink);
      }
      .shell {
        display: grid;
        grid-template-columns: 260px 1fr;
        min-height: 100vh;
      }
      .sidebar {
        background: #0a3f6a;
        color: #e6eef7;
        padding: 24px 18px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 28px;
      }
      .brand-badge {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        background: linear-gradient(135deg, #0e61a5, #4c8fd0);
        display: grid;
        place-items: center;
        color: white;
        font-weight: 700;
      }
      .nav {
        display: grid;
        gap: 6px;
      }
      .nav a {
        color: #dde9f5;
        text-decoration: none;
        padding: 10px 12px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .nav a.active, .nav a:hover {
        background: rgba(255,255,255,0.12);
      }
      .content {
        padding: 28px;
      }
      .topbar {
        background: linear-gradient(135deg, #0e61a5, #4c8fd0);
        color: white;
        border-radius: 20px;
        padding: 18px 22px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: var(--shadow);
        margin-bottom: 20px;
      }
      .topbar small {
        color: #d3e4f3;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 16px;
        box-shadow: var(--shadow);
      }
      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .section-header strong {
        font-size: 16px;
      }
      .stat-grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
      .stat-card {
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 18px;
        border-radius: 16px;
        background: linear-gradient(160deg, rgba(14, 97, 165, 0.08), rgba(76, 143, 208, 0.16));
        border: 1px solid rgba(14, 97, 165, 0.15);
      }
      .stat-card .stat-label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        font-weight: 600;
      }
      .stat-card .stat-value {
        font-size: 26px;
        font-weight: 700;
        color: var(--ink);
      }
      .stat-row {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .stat-row .card {
        padding: 16px 18px;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        border: 1px solid transparent;
      }
      .pill.open { background: #e0f2fe; color: #075985; border-color: #bae6fd; }
      .pill.assigned { background: #ede9fe; color: #5b21b6; border-color: #ddd6fe; }
      .pill.in-progress { background: #fef9c3; color: #854d0e; border-color: #fde68a; }
      .pill.completed { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
      .table .btn {
        padding: 6px 10px;
        font-size: 12px;
      }
      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: var(--muted);
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      input, select, textarea {
        width: 100%;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: #f8fafc;
        color: var(--ink);
        font-size: 14px;
        outline: none;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }
      input:focus, select:focus, textarea:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(14, 97, 165, 0.12);
        background: #ffffff;
      }
      textarea {
        min-height: 90px;
        resize: vertical;
      }
      .field-help {
        margin-top: 6px;
        font-size: 12px;
        color: var(--muted);
      }
      .grid {
        display: grid;
        gap: 14px;
      }
      .grid.cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .grid.cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .muted { color: var(--muted); }
      .table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }
      .table th, .table td {
        padding: 10px 8px;
        border-bottom: 1px solid var(--border);
        text-align: left;
      }
      .table th { color: #0f172a; font-weight: 700; background: #f1f5f9; }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        text-decoration: none;
        color: var(--ink);
        background: white;
      }
      .btn.primary {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
      }
      .filters {
        display: grid;
        gap: 12px;
        margin-top: 12px;
        padding: 12px;
        border: 1px dashed var(--border);
        border-radius: 14px;
        background: #f8fbff;
      }
      .filters .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .filters .inline {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }
      @media (max-width: 980px) {
        .shell { grid-template-columns: 1fr; }
        .sidebar { position: sticky; top: 0; z-index: 2; }
        .grid.cols-4, .grid.cols-3 { grid-template-columns: 1fr 1fr; }
        .stat-grid { grid-template-columns: 1fr 1fr; }
        .stat-row { grid-template-columns: 1fr 1fr; }
        .filters .inline { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
      @media (max-width: 640px) {
        .grid.cols-4, .grid.cols-3 { grid-template-columns: 1fr; }
        .content { padding: 18px; }
        .stat-grid { grid-template-columns: 1fr; }
        .stat-row { grid-template-columns: 1fr; }
        .filters .inline { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-badge">CS</div>
          <div>
            <div style="font-weight:700;">Support Panel</div>
            <small>Admin workspace</small>
          </div>
        </div>
        <nav class="nav">
          <a href="/panel/" class="{% if page_title == 'Dashboard' %}active{% endif %}">Dashboard</a>
          <a href="/panel/tickets/" class="{% if page_title == 'Tickets' %}active{% endif %}">Tickets</a>
          <a href="/panel/engineers/" class="{% if page_title == 'Engineers' %}active{% endif %}">Engineers</a>
          <a href="/panel/reports/" class="{% if page_title == 'Reports' %}active{% endif %}">Reports</a>
          <a href="/panel/admins/" class="{% if page_title == 'Admin Profiles' %}active{% endif %}">Admin Profiles</a>
          {% if PANEL_SHOW_ADMIN_LINK %}
            <a href="/admin/logout/?next=/admin/">Admin</a>
          {% endif %}
        </nav>
      </aside>
      <main class="content">
        <div class="topbar">
          <div>
            <div style="font-size:20px;font-weight:700;">{{ page_title }}</div>
            <small>Customer Support Operations</small>
          </div>
          <div>
            <a class="btn" href="/panel/logout/">Logout</a>
          </div>
        </div>
        {% block content %}{% endblock %}
      </main>
    </div>
    <script>
      (function () {
        function capfirstValue(value) {
          if (!value) return value;
          var trimmed = value.replace(/^\s+/, "");
          if (!trimmed) return value;
          var firstCharIndex = value.indexOf(trimmed[0]);
          return (
            value.slice(0, firstCharIndex) +
            trimmed[0].toUpperCase() +
            trimmed.slice(1)
          );
        }

        function applyCapfirst(el) {
          var type = (el.getAttribute("type") || "").toLowerCase();
          if (type === "password" || type === "email" || type === "date" || type === "number") return;
          if (el.hasAttribute("data-no-capfirst")) return;
          el.value = capfirstValue(el.value);
        }

        document.addEventListener("blur", function (e) {
          var el = e.target;
          if (!el) return;
          if (el.tagName === "INPUT" || el.tagName === "TEXTAREA") {
            applyCapfirst(el);
          }
        }, true);

        document.addEventListener("change", function (e) {
          var el = e.target;
          if (!el) return;
          if (el.tagName === "INPUT" || el.tagName === "TEXTAREA") {
            applyCapfirst(el);
          }
        }, true);
      })();
    </script>
  </body>
</html>
